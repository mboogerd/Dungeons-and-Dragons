name: Quartz Smoke Test

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "quartz/**"
      - "scripts/**"
      - "index.md"
      - "Enter the Dungeon/index.md"
  pull_request:
    paths:
      - ".github/workflows/**"
      - "quartz/**"
      - "scripts/**"
      - "index.md"
      - "Enter the Dungeon/index.md"

jobs:
  smoke-test:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out vault
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25

      - name: Run Quartz smoke test
        run: bash scripts/test-quartz-smoke.sh
